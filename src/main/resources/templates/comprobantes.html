<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mashi - Comprobantes</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/semantic-ui@2/dist/semantic.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar(titulo=${tituloPagina}, extras=${navExtras})}"></div>

<div class="ui container" style="margin-top: 6em;">
    <div class="ui grid">
        <div class="sixteen wide column">
            <h2 class="ui header">Mis comprobantes</h2>
            <div class="ui error message" id="mensaje-error-comprobantes" style="display:none;"></div>
            <table class="ui celled table">
                <thead>
                <tr>
                    <th>Numero</th>
                    <th>Tipo</th>
                    <th>Cliente</th>
                    <th>Total</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th></th>
                </tr>
                </thead>
                <tbody id="filas-comprobantes"></tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: base}"></th:block>
<script src="/js/api.js"></script>
<script src="/js/comprobantes.js"></script>
</body>
</html>
