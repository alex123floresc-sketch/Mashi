<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mashi - Administracion</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/semantic-ui@2/dist/semantic.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar(titulo=${tituloPagina}, extras=${navExtras})}"></div>

<div class="ui container" style="margin-top: 6em;">
    <div class="ui grid">
        <div class="six wide column">
            <h2 class="ui header">Nueva categoria</h2>
            <div class="ui error message" id="mensaje-error-categoria" style="display:none;"></div>
            <form class="ui form" id="form-categoria">
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="field">
                    <label>Descripcion</label>
                    <input type="text" name="descripcion">
                </div>
                <button class="ui teal button" type="submit">Crear categoria</button>
            </form>

            <h2 class="ui header" style="margin-top: 2em;">Nuevo producto</h2>
            <div class="ui error message" id="mensaje-error-producto" style="display:none;"></div>
            <form class="ui form" id="form-producto">
                <div class="field">
                    <label>SKU</label>
                    <input type="text" name="sku" required>
                </div>
                <div class="field">
                    <label>Nombre</label>
                    <input type="text" name="nombre" required>
                </div>
                <div class="field">
                    <label>Descripcion</label>
                    <input type="text" name="descripcion">
                </div>
                <div class="field">
                    <label>Precio</label>
                    <input type="number" step="0.01" min="0.01" name="precio" required>
                </div>
                <div class="field">
                    <label>Categoria</label>
                    <select class="ui dropdown" name="categoriaId" id="select-categoria" required></select>
                </div>
                <div class="field">
                    <label>Stock inicial</label>
                    <input type="number" min="0" name="stockDisponible" required>
                </div>
                <button class="ui teal button" type="submit">Crear producto</button>
            </form>
        </div>

        <div class="ten wide column">
            <h2 class="ui header">Productos</h2>
            <table class="ui celled table">
                <thead>
                <tr>
                    <th>SKU</th>
                    <th>Nombre</th>
                    <th>Categoria</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Activo</th>
                </tr>
                </thead>
                <tbody id="filas-productos"></tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: base}"></th:block>
<script src="/js/api.js"></script>
<script src="/js/admin.js"></script>
</body>
</html>
