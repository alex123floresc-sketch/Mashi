<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mashi - Analitica</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/semantic-ui@2/dist/semantic.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar(titulo=${tituloPagina}, extras=${navExtras})}"></div>

<div class="ui container" style="margin-top: 6em;">
    <div class="ui grid">
        <div class="sixteen wide column">
            <h2 class="ui header">Analitica</h2>
            <div class="ui error message" id="mensaje-error-analitica" style="display:none;"></div>

            <div class="ui four statistics">
                <div class="statistic">
                    <div class="value" id="stat-total-online">S/ 0.00</div>
                    <div class="label">Ventas online (30d)</div>
                </div>
                <div class="statistic">
                    <div class="value" id="stat-total-pos">S/ 0.00</div>
                    <div class="label">Ventas POS (30d)</div>
                </div>
                <div class="statistic">
                    <div class="value" id="stat-total-general">S/ 0.00</div>
                    <div class="label">Total general (30d)</div>
                </div>
                <div class="statistic">
                    <div class="value" id="stat-cantidad-ventas">0</div>
                    <div class="label">Pedidos + ventas POS</div>
                </div>
            </div>
        </div>
    </div>

    <div class="ui grid" style="margin-top: 2em;">
        <div class="ten wide column">
            <h3 class="ui header">Ventas por dia</h3>
            <canvas id="grafico-ventas" height="120"></canvas>
        </div>
        <div class="six wide column">
            <h3 class="ui header">Productos mas vendidos</h3>
            <table class="ui celled table">
                <thead>
                <tr>
                    <th>Producto</th>
                    <th>Cant.</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody id="filas-top-productos"></tbody>
            </table>
        </div>
    </div>
</div>

<th:block th:replace="~{fragments/scripts :: base}"></th:block>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="/js/api.js"></script>
<script src="/js/admin-analitica.js"></script>
</body>
</html>
